<div id="player"></div>

 
  <script>

    var player = new Clappr.Player({
           source: "https://bein-esp-xumo.amagi.tv/playlist.m3u8",
        mimeType: 'application/dash+xml',
        Type: 'hls',
        poster: 'https://i.imgur.com/2bLKID7.jpeg',
        height: '100%',
        mute: false,
        volume:100,
       autoPlay: false,
        width: '100%',
         mediacontrol: { seekbar: "#ffea00", buttons: "#ffea00" },
                plugins: [
                    DashShakaPlayback,
                    ClapprPip.PipButton,
                    ClapprPip.PipPlugin,
                    LevelSelector
                ],
        plugins: [LevelSelector, DashShakaPlayback, ChromecastPlugin, ClapprPip.PipButton, ClapprPip.PipPlugin, Clappr.MediaControl],
        events: {onReady: function() {var plugin = this.getPlugin('click_to_pause'); plugin && plugin.disable();},},
        chromecast: {
            appId: '9DFB77C0',
            contentType: 'video/mp4',
        },
        shakaConfiguration: {
            drm: {
            servers: {
              'com.widevine.alpha': ''
}
            },
            preferredAudioLanguage: 'pt-BR',
        },
        shakaOnBeforeLoad: function (shaka_player) {},
        parentId: '#player'
    });
  
  
  
  // =============================
  // BLOQUE MODIFICADO SIN DVR
  // =============================
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isSmartTV = /SmartTV|SMART-TV|Tizen|Web0S|Roku|AppleTV|CrKey|Android TV|BRAVIA|HbbTV|NetCast|DTV|Smart-TV|Chromecast/i.test(navigator.userAgent);
 

  // Audio Boost
  if (!isSmartTV) {
    player.on("play", function () {
      const video = document.querySelector("#player video");
      if (video && !video.audioBoostApplied) {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioCtx.createMediaElementSource(video);
          const gain = audioCtx.createGain();
          gain.gain.value = 2;
          source.connect(gain);
          gain.connect(audioCtx.destination);
          video.muted = false;
          video.volume = 1.0;
          video.audioBoostApplied = true;
        } catch(e) { console.warn("Audio boost no disponible:", e); }
      }
    });
  }

  // SmartTV fallback
  if (isSmartTV) {
    player.on("ready", function () {
      const video = document.querySelector("#player video");
      if (video) { video.muted = false; try { video.volume = 1.0; } catch(e){} }
    });
  }
 const hlsJsConfig = {
    autoStartLoad: true,
    capLevelToPlayerSize: true,
    maxBufferLength: 30,
    maxMaxBufferLength: 60,
    liveSyncDurationCount: 3,
    enableWorker: true,
    debug: false,
    abrEwmaFastLive: 3.0,
    abrEwmaSlowLive: 9.0,
    abrBandWidthFactor: 0.9,
    abrBandWidthUpFactor: 0.8
  };

  
  // Auto selección de audio
  const lang = 1;
  player.on("play", () => player.setCurrentAudioTrack(lang));

  // ROTACIÓN AUTOMÁTICA
  // Lógica de Rotación
    player.on("fullscreen", async function(isFullscreen) {
      const contenedor = document.getElementById("player-container");
      if (isFullscreen) {
        if (!isIOS && screen.orientation?.lock) {
          try { await screen.orientation.lock("landscape"); } catch(e) {}
        } else if (isIOS) {
          contenedor.classList.add("ios-landscape");
        }
      } else {
        if (!isIOS && screen.orientation?.unlock) {
          try { screen.orientation.unlock(); } catch(e) {}
        }
        if (isIOS) contenedor.classList.remove("ios-landscape");
      }
    });

    // WakeLock
    async function activarWakeLock() {
      if ("wakeLock" in navigator) {
        try { await navigator.wakeLock.request("screen"); } catch (err) {}
      }
    }
    player.on("play", () => activarWakeLock());
</script>
